<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fotball">
<title>Fotball Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --grass: #1a3a1f; --grass-mid: #1e4525; --lime: #a8e063; --lime-bright: #c5f270;
    --white: #f5f5f0; --muted: #8a9a80; --card: #162b1a; --border: rgba(168,224,99,0.15);
    --danger: #e05555; --gold: #f0c050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Barlow', sans-serif; background: var(--grass); color: var(--white); min-height: 100vh; min-height: -webkit-fill-available; padding-bottom: env(safe-area-inset-bottom); }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,0.03) 40px,rgba(0,0,0,0.03) 80px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,0.03) 40px,rgba(0,0,0,0.03) 80px); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 40px; }
  .header { padding: 56px 24px 24px; }
  .header-badge { display: inline-block; font-family: 'Barlow Condensed',sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--lime); background: rgba(168,224,99,0.1); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; margin-bottom: 10px; }
  h1 { font-family: 'Barlow Condensed',sans-serif; font-size: 42px; font-weight: 800; line-height: 1; text-transform: uppercase; }
  h1 span { color: var(--lime); }
  .header-sub { font-size: 14px; color: var(--muted); margin-top: 6px; font-weight: 300; }
  .form-section { margin-bottom: 8px; }
  .form-label { font-family: 'Barlow Condensed',sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
  input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--white); font-family: 'Barlow',sans-serif; font-size: 16px; padding: 14px 16px; outline: none; transition: border-color 0.2s; appearance: none; -webkit-appearance: none; }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--lime); background: rgba(168,224,99,0.05); }
  .number-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .number-control { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .num-btn { width: 48px; height: 52px; background: none; border: none; color: var(--lime); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .num-btn:active { background: rgba(168,224,99,0.1); }
  .num-display { flex: 1; text-align: center; font-family: 'Barlow Condensed',sans-serif; font-size: 26px; font-weight: 700; color: var(--white); }
  .num-label { font-family: 'Barlow Condensed',sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; text-align: center; padding-bottom: 6px; }
  .score-row { display: flex; align-items: center; gap: 10px; }
  .score-row .number-control { flex: 1; }
  .score-separator { font-family: 'Barlow Condensed',sans-serif; font-size: 28px; font-weight: 800; color: var(--muted); flex-shrink: 0; }
  .score-team-labels { display: flex; gap: 10px; margin-bottom: 4px; }
  .score-team-label { flex: 1; font-family: 'Barlow Condensed',sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; }
  .sep-spacer { width: 20px; flex-shrink: 0; flex-grow: 0; }
  .submit-btn { width: 100%; padding: 18px; background: var(--lime); border: none; border-radius: 12px; font-family: 'Barlow Condensed',sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grass); cursor: pointer; transition: all 0.15s; margin-top: 16px; }
  .submit-btn:active { transform: scale(0.98); background: var(--lime-bright); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 500; white-space: nowrap; z-index: 100; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--lime); color: var(--lime); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  #main-screen { padding: 0 24px; animation: slideUp 0.4s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .toggle-btn { padding: 14px 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-family: 'Barlow Condensed',sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; text-align: center; }
  .toggle-btn.active { background: rgba(168,224,99,0.15); border-color: var(--lime); color: var(--lime); }
  .score-team-label.highlight { color: var(--lime); font-weight: 800; }
  .resultat-auto { padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); font-family: 'Barlow Condensed',sans-serif; font-size: 18px; font-weight: 700; text-align: center; color: var(--muted); transition: all 0.2s; letter-spacing: 0.05em; }
  .resultat-auto.seier    { background: rgba(168,224,99,0.15); border-color: var(--lime); color: var(--lime); }
  .resultat-auto.uavgjort { background: rgba(240,192,80,0.15); border-color: var(--gold); color: var(--gold); }
  .resultat-auto.tap      { background: rgba(224,85,85,0.15); border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">⚽ Sesong 2025</div>
    <h1>Kamp<span>logger</span></h1>
    <p class="header-sub">Klar til å logge kamp 🟢</p>
  </div>
  <div id="main-screen">
    <div class="form-section">
      <label class="form-label">Dato</label>
      <input type="date" id="dato">
    </div>
    <div class="form-section">
      <label class="form-label">Hjemme eller borte?</label>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-hjemme-toggle" onclick="setKamptype('hjemme')">🏠 Hjemmekamp</button>
        <button class="toggle-btn" id="btn-borte-toggle" onclick="setKamptype('borte')">✈️ Bortekamp</button>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">Motstanderlag</label>
      <input type="text" id="motstander" placeholder="F.eks. Brann IL" autocomplete="off">
    </div>
    <div class="form-section">
      <label class="form-label">Eget lag / tropp</label>
      <input type="text" id="eget-lag" placeholder="F.eks. Stabæk G12" autocomplete="off">
    </div>
    <div class="form-section">
      <label class="form-label">Turnering / serie</label>
      <input type="text" id="turnering" placeholder="F.eks. Kretscup, seriespill..." autocomplete="off">
    </div>
    <div class="divider"></div>
    <div class="form-section">
      <div class="score-team-labels">
        <span class="score-team-label highlight" id="label-hjemme">Hjemmelag</span>
        <span class="score-team-label sep-spacer"></span>
        <span class="score-team-label" id="label-borte">Bortelag</span>
      </div>
      <div class="score-row">
        <div class="number-control">
          <button class="num-btn" onclick="adjust('hjemme',-1)">−</button>
          <span class="num-display" id="hjemme-display">0</span>
          <button class="num-btn" onclick="adjust('hjemme',1)">+</button>
        </div>
        <span class="score-separator">–</span>
        <div class="number-control">
          <button class="num-btn" onclick="adjust('borte',-1)">−</button>
          <span class="num-display" id="borte-display">0</span>
          <button class="num-btn" onclick="adjust('borte',1)">+</button>
        </div>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">Resultat</label>
      <div id="resultat-display" class="resultat-auto">–</div>
    </div>
    <div class="divider"></div>
    <div class="form-section">
      <div class="number-row">
        <div>
          <span class="num-label">Mål</span>
          <div class="number-control">
            <button class="num-btn" onclick="adjust('mal',-1)">−</button>
            <span class="num-display" id="mal-display">0</span>
            <button class="num-btn" onclick="adjust('mal',1)">+</button>
          </div>
        </div>
        <div>
          <span class="num-label">Assist</span>
          <div class="number-control">
            <button class="num-btn" onclick="adjust('assist',-1)">−</button>
            <span class="num-display" id="assist-display">0</span>
            <button class="num-btn" onclick="adjust('assist',1)">+</button>
          </div>
        </div>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="lagreKamp()">Lagre kamp</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const SUPABASE_URL = 'https://gjxsebeajcrmseraypyw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_gkIN7XSAzQVKS9lpqj6LYQ_vV8G3VRe';

  let mal = 0, assist = 0, hjemme = 0, borte = 0, kamptype = 'hjemme';

  window.addEventListener('load', () => {
    document.getElementById('dato').value = new Date().toISOString().split('T')[0];
    oppdaterResultat();
  });

  function setKamptype(type) {
    kamptype = type;
    document.getElementById('btn-hjemme-toggle').classList.toggle('active', type === 'hjemme');
    document.getElementById('btn-borte-toggle').classList.toggle('active', type === 'borte');
    document.getElementById('label-hjemme').classList.toggle('highlight', type === 'hjemme');
    document.getElementById('label-borte').classList.toggle('highlight', type === 'borte');
    oppdaterResultat();
  }

  function oppdaterResultat() {
    const el = document.getElementById('resultat-display');
    let r;
    if (kamptype === 'hjemme') {
      r = hjemme > borte ? 'seier' : hjemme < borte ? 'tap' : 'uavgjort';
    } else {
      r = borte > hjemme ? 'seier' : borte < hjemme ? 'tap' : 'uavgjort';
    }
    const labels = { seier: '🏆 Seier', uavgjort: '🤝 Uavgjort', tap: '💪 Tap' };
    el.textContent = labels[r];
    el.className = 'resultat-auto ' + r;
  }

  function adjust(type, delta) {
    if (type === 'mal') {
      mal = Math.max(0, mal + delta);
      document.getElementById('mal-display').textContent = mal;
      if (kamptype === 'hjemme' && hjemme < mal) { hjemme = mal; document.getElementById('hjemme-display').textContent = hjemme; }
      else if (kamptype === 'borte' && borte < mal) { borte = mal; document.getElementById('borte-display').textContent = borte; }
      oppdaterResultat();
    }
    if (type === 'assist') { assist = Math.max(0, assist+delta); document.getElementById('assist-display').textContent = assist; }
    if (type === 'hjemme') {
      hjemme = Math.max(kamptype === 'hjemme' ? mal : 0, hjemme + delta);
      document.getElementById('hjemme-display').textContent = hjemme;
      oppdaterResultat();
    }
    if (type === 'borte') {
      borte = Math.max(kamptype === 'borte' ? mal : 0, borte + delta);
      document.getElementById('borte-display').textContent = borte;
      oppdaterResultat();
    }
  }

  async function lagreKamp() {
    const dato       = document.getElementById('dato').value;
    const motstander = document.getElementById('motstander').value.trim();
    const egetLag    = document.getElementById('eget-lag').value.trim();
    const turnering  = document.getElementById('turnering').value.trim();
    if (!dato || !motstander || !egetLag) {
      showToast('Fyll inn dato, motstander og lag', 'error');
      return;
    }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Lagrer...';
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/kamper', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ dato, motstanderlag: motstander, eget_lag: egetLag, turnering, hjemme, borte, mal, assist, kamptype })
      });
      if (res.ok) { showToast('⚽ Kamp lagret!', 'success'); resetForm(); }
      else { const err = await res.json(); showToast('Feil: ' + (err.message || 'ukjent'), 'error'); }
    } catch(e) { showToast('Nettverksfeil – prøv igjen', 'error'); }
    btn.disabled = false; btn.textContent = 'Lagre kamp';
  }

  function resetForm() {
    ['motstander','eget-lag','turnering'].forEach(id => document.getElementById(id).value = '');
    mal = 0; assist = 0; hjemme = 0; borte = 0;
    ['mal','assist','hjemme','borte'].forEach(t => document.getElementById(t+'-display').textContent = '0');
    setKamptype('hjemme');
    oppdaterResultat();
    document.getElementById('dato').value = new Date().toISOString().split('T')[0];
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
